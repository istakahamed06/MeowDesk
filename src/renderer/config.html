<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>MeowDesk AI Settings</title>
    <link rel="stylesheet" href="config.css" />
  </head>
  <body>
    <h1>🐾 MeowDesk AI Settings</h1>

    <label
      >API Format
      <select id="format">
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI Compatible</option>
      </select>
    </label>

    <label
      >API Endpoint
      <input id="endpoint" type="text" spellcheck="false" autocomplete="off" />
    </label>

    <label
      >API Key
      <input id="apiKey" type="password" placeholder="••••••••" autocomplete="off" />
    </label>

    <label
      >Model
      <input id="model" type="text" spellcheck="false" autocomplete="off" />
    </label>

    <div class="row">
      <button id="verify" class="btn">Verify Connection</button>
      <button id="save" class="btn primary">Save</button>
    </div>

    <div id="status" class="status"></div>

    <script src="config.js"></script>
  </body>
</html>
